<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #FFF176; --yellow-dark: #F9E84A;
    --pink: #FFB3C1;   --pink-dark: #FF8FA3;
    --blue: #B3E5FC;   --blue-dark: #81D4FA;
    --green: #C8E6C9;  --green-dark: #A5D6A7;
    --bg: #F0EDE6; --text: #2C2416; --muted: #8C7E5E; --cork: #C4956A;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(ellipse at 20% 30%, rgba(196,149,106,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(196,149,106,0.1) 0%, transparent 50%); }

  .logo { font-family: 'Caveat', cursive; font-size: 32px; font-weight: 600; color: var(--text); }
  .logo span { color: var(--cork); }
  .color-picker { display: flex; gap: 8px; align-items: center; }
  .color-picker label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: var(--text); transform: scale(1.15); }
  .color-dot.yellow { background: var(--yellow-dark); }
  .color-dot.pink   { background: var(--pink-dark); }
  .color-dot.blue   { background: var(--blue-dark); }
  .color-dot.green  { background: var(--green-dark); }
